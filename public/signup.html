<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | JobFinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p>Start saving remote opportunities</p>
            <form id="signupForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Minimum 6 characters">
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
            <p><a href="index.html">Back to Search</a></p>
        </div>
    </div>
    <script>
        console.log('Signup script loaded');
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            console.log('Signup form submitted');
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    alert('Account created!');
                    window.location.href = 'index.html';
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('Signup failed');
            }
        });
    </script>
</body>
</html>
